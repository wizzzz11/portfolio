<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emotional Buddy 🤖💬</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2&family=Comic+Neue:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --light-bg: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
      --dark-bg: linear-gradient(135deg, #141E30, #243B55);
      --light-card: #ffffff;
      --dark-card: #1e1e2e;
      --light-text: #333;
      --dark-text: #f0f0f0;
      --user-bubble-light: #ff6f91;
      --user-bubble-dark: #ff4f81;
      --bot-bubble-light: #a6c1ee;
      --bot-bubble-dark: #5d8ee0;
    }

    body {
      margin: 0;
      font-family: 'Comic Neue', 'Poppins', sans-serif;
      background: var(--light-bg);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: 0.5s ease;
    }

    .dark-mode {
      background: var(--dark-bg);
    }

    .chat-container {
      width: 90%;
      max-width: 450px;
      height: 90vh;
      background: var(--light-card);
      border-radius: 20px;
      box-shadow: 0px 8px 25px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: 0.5s ease;
    }
    .dark-mode .chat-container {
      background: var(--dark-card);
    }

    .chat-header {
      background: linear-gradient(135deg, #ff6f91, #ff9671, #ffc75f, #f9f871);
      color: white;
      padding: 15px;
      font-size: 1.4rem;
      font-weight: 600;
      text-align: center;
      font-family: 'Baloo 2', cursive;
      position: relative;
    }

    .toggle-btn {
      position: absolute;
      right: 15px;
      top: 10px;
      background: #fff;
      border: none;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: bold;
      transition: 0.3s;
    }
    .toggle-btn:hover {
      transform: scale(1.1);
    }

    .chat-box {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 20px;
      font-size: 1rem;
      line-height: 1.4;
      font-family: 'Comic Neue', cursive;
      animation: fadeIn 0.3s ease;
    }

    .user-message {
      align-self: flex-end;
      background: var(--user-bubble-light);
      color: white;
      border-bottom-right-radius: 5px;
    }
    .dark-mode .user-message {
      background: var(--user-bubble-dark);
    }

    .bot-message {
      align-self: flex-start;
      background: var(--bot-bubble-light);
      color: var(--light-text);
      border-bottom-left-radius: 5px;
    }
    .dark-mode .bot-message {
      background: var(--bot-bubble-dark);
      color: var(--dark-text);
    }

    .chat-input {
      display: flex;
      border-top: 1px solid #ddd;
      background: #fafafa;
      padding: 10px;
    }
    .dark-mode .chat-input {
      background: #2a2a3d;
      border-top: 1px solid #444;
    }

    .chat-input input {
      flex: 1;
      border: none;
      outline: none;
      padding: 12px;
      border-radius: 25px;
      font-size: 1rem;
      background: #f0f0f0;
    }
    .dark-mode .chat-input input {
      background: #3b3b52;
      color: white;
    }

    .chat-input button {
      background: linear-gradient(135deg, #ff6f91, #ff9671);
      border: none;
      color: white;
      font-size: 1.1rem;
      margin-left: 10px;
      padding: 12px 18px;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
    }
    .chat-input button:hover {
      transform: scale(1.1);
      background: linear-gradient(135deg, #ff9671, #ff6f91);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chat-box::-webkit-scrollbar {
      width: 6px;
    }
    .chat-box::-webkit-scrollbar-thumb {
      background: #bbb;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
       Emotional Buddy 🤖
      <button class="toggle-btn" onclick="toggleMode()">🌙</button>
    </div>
    <div class="chat-box" id="chat-box">
      <div class="bot-message message">👋 Hey friend! I’m your Emotional Buddy 🥳✨<br>How are you feeling today? 💖</div>
    </div>
    <div class="chat-input">
      <input type="text" id="user-input" placeholder="Type your message... 😎" />
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const body = document.body;
    const toggleBtn = document.querySelector('.toggle-btn');
    let darkMode = false;

    function toggleMode() {
      darkMode = !darkMode;
      if (darkMode) {
        body.classList.add('dark-mode');
        toggleBtn.innerText = "☀️";
      } else {
        body.classList.remove('dark-mode');
        toggleBtn.innerText = "🌙";
      }
    }

    function sendMessage() {
      const message = userInput.value.trim();
      if (message === "") return;

      const userMsg = document.createElement('div');
      userMsg.className = 'user-message message';
      userMsg.innerText = "😎 " + message;
      chatBox.appendChild(userMsg);

      userInput.value = "";
      chatBox.scrollTop = chatBox.scrollHeight;

      setTimeout(() => {
        const botMsg = document.createElement('div');
        botMsg.className = 'bot-message message';
        botMsg.innerText = "🤖 I'm listening with my 💜 (Replace me with your model’s response)";
        chatBox.appendChild(botMsg);
        chatBox.scrollTop = chatBox.scrollHeight;
      }, 1000);
    }

    userInput.addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
