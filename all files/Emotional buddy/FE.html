<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emotional Buddy 💬</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      transition: background 0.5s ease;
    }

    body.dark {
      background: linear-gradient(135deg, #1f1c2c 0%, #928dab 100%);
      color: #f0f0f0;
    }

    .chat-container {
      width: 400px;
      height: 620px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.3s ease;
    }

    body.dark .chat-container {
      background: rgba(40, 40, 60, 0.9);
    }

    .header {
      background: linear-gradient(90deg, #ff758c, #ff7eb3);
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      font-size: 1.6rem;
      font-weight: 700;
      font-family: 'Comic Neue', cursive;
    }

    .toggle-button {
      background: white;
      border: none;
      border-radius: 50%;
      width: 35px;
      height: 35px;
      cursor: pointer;
      font-size: 1.3rem;
      transition: transform 0.3s;
    }

    .toggle-button:hover {
      transform: rotate(20deg);
    }

    .chat-box {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: rgba(255, 255, 255, 0.8);
      font-weight: 500;
    }

    body.dark .chat-box {
      background: rgba(30, 30, 50, 0.8);
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 1rem;
      line-height: 1.4;
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, #a8ff78, #78ffd6);
      color: #08415c;
      border-bottom-right-radius: 0;
    }

    .bot {
      align-self: flex-start;
      background: linear-gradient(135deg, #c3cfe2, #c3cfe2);
      color: #3a3a3a;
      border-bottom-left-radius: 0;
    }

    body.dark .bot {
      background: linear-gradient(135deg, #373b44, #4286f4);
      color: white;
    }

    .input-area {
      display: flex;
      border-top: 2px solid #ffb6b6;
      background: #fff0f5;
    }

    body.dark .input-area {
      background: #2a2a3b;
      border-top: 2px solid #4b4b6a;
    }

    .input-area input {
      flex: 1;
      border: none;
      outline: none;
      padding: 15px;
      font-size: 1rem;
      background: transparent;
      color: inherit;
    }

    .input-area button {
      background: linear-gradient(135deg, #ff9a9e, #fecfef);
      color: white;
      border: none;
      padding: 0 20px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: background 0.3s;
      border-radius: 0 0 20px 0;
    }

    .input-area button:hover {
      background: linear-gradient(135deg, #f5576c, #f093fb);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="header">
      Emotional Buddy 🤖
      <button class="toggle-button" id="modeBtn">🌞</button>
    </div>
    <div class="chat-box" id="chat-box">
      <div class="bot message">👋 Hey there! I'm your Emotional Buddy 💖. How are you feeling 😊?</div>
    </div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type your message..." />
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('userInput');
    const modeBtn = document.getElementById('modeBtn');

    function appendMessage(message, sender) {
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('message', sender);
      msgDiv.innerHTML = message;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendMessage() {
      const text = userInput.value.trim();
      if (text === '') return;
      appendMessage(`😃 ${text}`, 'user');
      userInput.value = '';

      setTimeout(() => {
        appendMessage('🧠 Emotional Buddy is thinking...', 'bot');
        setTimeout(() => {
          appendMessage('💫 Thanks for opening up! I’ll be here to support you soon with real empathy 💖.', 'bot');
        }, 1400);
      }, 600);
    }

    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    modeBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      modeBtn.textContent = document.body.classList.contains('dark') ? '🌙' : '🌞';
    });
  </script>
</body>
</html>
