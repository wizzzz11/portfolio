<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotional Buddy</title>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Open+Sans&family=Pacifico&family=Poppins:wght@700&family=Roboto&display=swap" rel="stylesheet">
    <style>
        /* General styles and themes */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #6a1b9a, #1e88e5, #00c853); /* Updated gradient: Purple to blue to green */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #333;
            transition: background 0.3s ease;
        }

        body.dark-theme {
            background: linear-gradient(135deg, #121212, #2c2c2c, #4c4c4c);
            color: #f9f9f9;
        }

        .chat-container {
            width: 90%;
            max-width: 600px;
            height: 80vh;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        body.dark-theme .chat-container {
            background-color: rgba(30, 30, 30, 0.9);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        header {
            background: linear-gradient(90deg, #ff007f, #ff6b6b);
            color: white;
            padding: 15px;
            text-align: center;
            font-family: 'Lobster', cursive;
            font-size: 24px;
            border-bottom: 2px solid #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        body.dark-theme header {
            background: linear-gradient(90deg, #4a4a4a, #6b6b6b);
            border-bottom: 2px solid #444;
        }

        header .theme-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        body.dark-theme header .theme-toggle {
            color: #f9f9f9;
        }

        header h1 {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        header h1::after {
            content: '🤖';
            margin-left: 10px;
            font-size: 28px;
        }

        .chat-log {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column;
        }

        body.dark-theme .chat-log {
            background-color: #1e1e1e;
        }

        .message {
            margin: 10px 0;
            padding: 12px 15px;
            border-radius: 15px;
            max-width: 80%;
            opacity: 0;
            transition: opacity 0.5s ease, background 0.3s ease;
        }

        .message.user {
            background-color: #2196F3;
            align-self: flex-end;
            color: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            font-family: 'Roboto', sans-serif;
        }

        body.dark-theme .message.user {
            background-color: #1e88e5;
        }

        .message.bot {
            background-color: #ffeb3b;
            align-self: flex-start;
            color: #333;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            font-family: 'Roboto', sans-serif;
        }

        body.dark-theme .message.bot {
            background-color: #ffb300;
            color: #fff;
        }

        .message.show {
            opacity: 1;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background-color: #fff;
            border-top: 2px solid #eee;
        }

        body.dark-theme .input-area {
            background-color: #2a2a2a;
            border-top: 2px solid #444;
        }

        .input-area input {
            flex: 1;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-family: 'Open Sans', sans-serif;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            background-color: #fff;
            color: #333;
        }

        body.dark-theme .input-area input {
            background-color: #333;
            border: 1px solid #555;
            color: #f9f9f9;
        }

        .input-area input:focus {
            border-color: #00ff9f;
        }

        body.dark-theme .input-area input:focus {
            border-color: #4a90e2;
        }

        .input-area button {
            margin-left: 10px;
            padding: 15px 20px;
            background: linear-gradient(90deg, #ff007f, #ff6b6b);
            border: none;
            border-radius: 25px;
            color: white;
            font-family: 'Open Sans', sans-serif;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        body.dark-theme .input-area button {
            background: linear-gradient(90deg, #4a4a4a, #6b6b6b);
        }

        .input-area button:hover {
            transform: scale(1.05);
        }

        .input-area button::after {
            content: ' ✉️';
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <header>
            <h1>Emotional Buddy</h1>
            <button class="theme-toggle" id="theme-toggle">🌙</button>
        </header>
        <div class="chat-log" id="chat-log">
            <div class="message bot">Hi! I'm Emotional Buddy 😊 How can I help you today?</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message...">
            <button id="send-button">Send</button>
        </div>
    </div>

    <script>
        document.getElementById('send-button').addEventListener('click', function() {
            const userInput = document.getElementById('user-input');
            const messageText = userInput.value.trim();
            
            if (messageText !== '') {
                const chatLog = document.getElementById('chat-log');
                
                const userMessage = document.createElement('div');
                userMessage.className = 'message user';
                userMessage.textContent = messageText;
                userMessage.classList.add('show');
                chatLog.appendChild(userMessage);
                chatLog.scrollTop = chatLog.scrollHeight;
                userInput.value = '';
                
                setTimeout(() => {
                    const botMessage = document.createElement('div');
                    botMessage.className = 'message bot';
                    botMessage.textContent = `You said: "${messageText}" 😃 Let me think about that!`;
                    botMessage.classList.add('show');
                    chatLog.appendChild(botMessage);
                    chatLog.scrollTop = chatLog.scrollHeight;
                }, 1000);
            }
        });

        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('send-button').click();
            }
        });

        document.getElementById('theme-toggle').addEventListener('click', function() {
            document.body.classList.toggle('dark-theme');
            if (document.body.classList.contains('dark-theme')) {
                this.textContent = '☀️';
            } else {
                this.textContent = '🌙';
            }
        });
    </script>
</body>
</html>
