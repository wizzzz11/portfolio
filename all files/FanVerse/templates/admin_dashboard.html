{% extends "base.html" %}

{% block content %}

<h2 class="text-3xl font-bold mb-6">Orders</h2>

<table class="bg-white w-full">

<tr>
<th>Name</th>
<th>Phone</th>
<th>Address</th>
<th>Product</th>
<th>Price</th>
</tr>

{% for order in orders %}

<tr>

<td>{{ order[1] }}</td>
<td>{{ order[2] }}</td>
<td>{{ order[3] }}</td>
<td>{{ order[4] }}</td>
<td>{{ order[5] }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
