{% extends "base.html" %}

{% block content %}

<h2 class="text-2xl font-bold">Admin Login</h2>

<form method="POST" class="mt-6">

<input name="username"
placeholder="Username"
class="border p-2 w-full mb-2">

<input name="password"
placeholder="Password"
type="password"
class="border p-2 w-full mb-2">

<button class="bg-black text-white px-4 py-2">
Login
</button>

</form>

{% endblock %}
