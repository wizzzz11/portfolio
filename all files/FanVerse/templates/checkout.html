{% extends "base.html" %}

{% block content %}

<h2 class="text-2xl font-bold">Checkout</h2>

<div class="bg-white p-6 rounded mt-6">

<h3>{{ product }}</h3>
<p>₹{{ price }}</p>

<img src="{{ url_for('static', filename='images/qr.png') }}" width="200">

<p>UPI ID: sourabrata@okaxis</p>

<form action="/order" method="POST" class="mt-4">

<input type="hidden" name="product" value="{{ product }}">
<input type="hidden" name="price" value="{{ price }}">

<input name="name" placeholder="Name"
class="border p-2 w-full mb-2">

<input name="phone" placeholder="Phone"
class="border p-2 w-full mb-2">

<input name="address" placeholder="Address"
class="border p-2 w-full mb-2">

<button class="bg-orange-500 text-white px-4 py-2 rounded">
Place Order
</button>

</form>

</div>

{% endblock %}
