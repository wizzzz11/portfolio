<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Valentine 💘</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg,#ff4e8a,#ff758c,#ff7eb3,#ff9a9e);
    background-size:400% 400%;
    animation: gradientFlow 10s ease infinite;
    overflow:hidden;
    font-family:'Montserrat',sans-serif;
    color:white;
}

@keyframes gradientFlow{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    padding:50px 40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 25px 50px rgba(0,0,0,0.3);
    width:90%;
    max-width:420px;
    animation: fadeIn 1.2s ease;
}

h1{
    font-family:'Great Vibes',cursive;
    font-size:42px;
    margin-bottom:25px;
    animation: pulse 2s infinite;
}

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
}

button{
    padding:14px 30px;
    margin:12px;
    border:none;
    border-radius:50px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.4s;
    position:relative;
    overflow:hidden;
}

.yes{
    background:#ff0066;
    color:white;
}

.no{
    background:white;
    color:#ff0066;
}

button:hover{
    transform:scale(1.12);
    box-shadow:0 0 20px rgba(255,255,255,0.6);
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(-20px);}
    to{opacity:1; transform:translateY(0);}
}

.heart{
    position:absolute;
    font-size:20px;
    animation: float 6s linear infinite;
    opacity:0.7;
}

@keyframes float{
    0%{transform:translateY(100vh) scale(1);}
    100%{transform:translateY(-10vh) scale(1.8);}
}

.end-page{
    display:none;
    animation: fadeIn 1s ease;
}

.footer{
    position:absolute;
    bottom:15px;
    font-size:14px;
    opacity:0.8;
    font-weight:600;
}

.burst{
    position:absolute;
    font-size:24px;
    animation: burst 1s ease forwards;
}

@keyframes burst{
    0%{opacity:1; transform:scale(1);}
    100%{opacity:0; transform:translateY(-100px) scale(2);}
}

</style>
</head>

<body>

<div class="container" id="mainPage">
    <h1>Will You Be My Valentine? 💖</h1>
    <button class="yes" onclick="yesClicked()">Yes 😍</button>
    <button class="no" onclick="noClicked()">No 😌</button>
</div>

<div class="container end-page" id="endPage">
    <h1 id="endMessage"></h1>
    <p style="margin-top:15px;font-size:18px;">
        🌹 Happy Valentine’s Day My Love 🌹<br><br>
        Forever yours. No escape. No returns. 💞✨
    </p>
</div>

<div class="footer">
    made by wizz 💫
</div>

<script>

function burstEffect(){
    for(let i=0;i<10;i++){
        const burst=document.createElement("div");
        burst.classList.add("burst");
        burst.innerHTML="💖";
        burst.style.left=Math.random()*100+"vw";
        burst.style.top=Math.random()*100+"vh";
        document.body.appendChild(burst);
        setTimeout(()=>burst.remove(),1000);
    }
}

function yesClicked(){
    burstEffect();
    setTimeout(()=>{
        document.getElementById("mainPage").style.display="none";
        document.getElementById("endPage").style.display="block";
        document.getElementById("endMessage").innerHTML="You’re officially stuck with me forever 😏💘";
    },800);
}

function noClicked(){
    burstEffect();
    setTimeout(()=>{
        document.getElementById("mainPage").style.display="none";
        document.getElementById("endPage").style.display="block";
        document.getElementById("endMessage").innerHTML="Error 404 ❌<br>‘No’ Option Not Available 😌💖";
    },800);
}

function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="💗";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(Math.random()*3+3)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
}

setInterval(createHeart,400);

</script>

</body>
</html>
