<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGROBOAT | CODE TO GROWTH</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1d976c, #93f9b9);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px;
    }

    .chat-container {
      width: 100%;
      max-width: 420px;
      height: 90vh;
      background: #0f172a;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    /* Header */
    .chat-header {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      padding: 16px;
      text-align: center;
      color: white;
    }

    .chat-header h1 {
      font-size: 1.4rem;
      font-weight: 600;
    }

    .chat-header p {
      font-size: 0.75rem;
      opacity: 0.9;
    }

    /* Chat area */
    .chat-box {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #020617;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.9rem;
      animation: fadeIn 0.3s ease;
      line-height: 1.4;
    }

    .bot {
      background: #1e293b;
      color: #e5e7eb;
      align-self: flex-start;
      border-top-left-radius: 4px;
    }

    .user {
      background: #22c55e;
      color: #022c22;
      align-self: flex-end;
      border-top-right-radius: 4px;
    }

    /* Input area */
    .chat-input {
      display: flex;
      padding: 10px;
      background: #020617;
      border-top: 1px solid #1e293b;
    }

    .chat-input input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 0.9rem;
      background: #1e293b;
      color: white;
    }

    .chat-input button {
      margin-left: 8px;
      background: #22c55e;
      border: none;
      padding: 0 18px;
      border-radius: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
    }

    .chat-input button:hover {
      background: #16a34a;
    }

    /* Scrollbar */
    .chat-box::-webkit-scrollbar {
      width: 5px;
    }

    .chat-box::-webkit-scrollbar-thumb {
      background: #22c55e;
      border-radius: 10px;
    }

    /* Animation */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .chat-container {
        height: 95vh;
      }
    }
  </style>
</head>
<body>

  <div class="chat-container">
    <div class="chat-header">
      <h1>🌱 AGROBOAT</h1>
      <p>Powered by CODE TO GROWTH</p>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="message bot">
        Hello 👋 I'm <b>AGROBOAT</b>.  
        How can I help you today?
      </div>
    </div>

    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Type your message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");

    function sendMessage() {
      const text = userInput.value.trim();
      if (text === "") return;

      addMessage(text, "user");
      userInput.value = "";

      setTimeout(() => {
        addMessage("I'm thinking 🤖... (connect me to backend soon)", "bot");
      }, 600);
    }

    function addMessage(text, sender) {
      const msg = document.createElement("div");
      msg.classList.add("message", sender);
      msg.innerHTML = text;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    userInput.addEventListener("keypress", function (e) {
      if (e.key === "Enter") sendMessage();
    });
  </script>

</body>
</html>
